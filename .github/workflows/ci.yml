name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scopilot
          POSTGRES_PASSWORD: scopilot
          POSTGRES_DB: scopilot
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U scopilot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,worker,webex,mcp,cli,sources,postgres]"
      - name: Lint
        run: ruff check .
      - name: Run Alembic migrations against Postgres
        env:
          SCOPILOT_DB__URL: postgresql+asyncpg://scopilot:scopilot@localhost:5432/scopilot
          SCOPILOT_DB__SYNC_URL: postgresql+psycopg2://scopilot:scopilot@localhost:5432/scopilot
        run: alembic upgrade head
      - name: pytest
        env:
          SCOPILOT_DB__URL: sqlite+aiosqlite:///:memory:
        run: pytest -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"  # warn, don't fail (Phase-6 follow-up: fail on CRITICAL)
