apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-http
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-http
  template:
    metadata:
      labels:
        app: mcp-http
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: mcp
          image: ghcr.io/rlienard/segmentation-copilot:latest
          command: ["python", "-m", "services.mcp_server.http", "--port", "8002"]
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: scopilot-config
            - secretRef:
                name: scopilot-secrets
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-http
spec:
  selector:
    app: mcp-http
  ports:
    - port: 80
      targetPort: 8002
      name: http
