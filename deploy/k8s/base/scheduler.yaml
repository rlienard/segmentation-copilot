# Two replicas — one is the elected leader, the other idles, ready to
# take over when the lease expires. Redis SETNX-EX in services.worker.leader
# enforces the single-active invariant.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: scheduler
          image: ghcr.io/rlienard/segmentation-copilot:latest
          command: ["python", "-m", "services.worker.main", "--role", "scheduler"]
          envFrom:
            - configMapRef:
                name: scopilot-config
            - secretRef:
                name: scopilot-secrets
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
# A 50% PDB keeps at least one scheduler standing during a rolling
# upgrade so the leader handover is fast.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scheduler
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: scheduler
